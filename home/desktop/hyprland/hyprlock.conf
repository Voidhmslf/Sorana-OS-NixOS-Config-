# 🦊 SoranaOS - Hyprlock Sanctuary 💠 (Style-8 Embrace)

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /home/void/sorana-os/home/desktop/pics/HomeIdle.png   # Твои любимые обои HomeIdle
    color = rgba(26, 29, 54, 1.0) # Soft Midnight Indigo
    blur_passes = 1
    blur_size = 3
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Часы (Часы) - Изумрудный акцент
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = rgba(0, 191, 165, 0.7) # Emerald
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    position = 0, 300
    halign = center
    valign = center
}

# Минуты - Пепельно-розовый
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgba(224, 212, 212, 0.7) # Ash Pink
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}

# Дата и месяц
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d %B')"
    color = rgba(224, 212, 212, 0.7) # Ash Pink
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}

# Аватарка (Круглая SoranaProfile)
image {
    monitor =
    path = /home/void/sorana-os/home/desktop/pics/SoranaProfile.png
    size = 180
    rounding = -1 # Положительное значение для скругления, -1 для круга
    border_size = 3
    border_color = rgba(0, 191, 165, 1.0) # Emerald
    rotate = 0
    reload_time = -1
    position = 0, -100
    halign = center
    valign = center
}

# Поле ввода пароля
input-field {
    monitor =
    size = 220, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 191, 165, 1.0) # Emerald
    inner_color = rgba(9, 10, 20, 0.5) # Void Indigo
    font_color = rgb(224, 212, 212) # Ash Pink
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = Hello, Void... 🦊
    hide_input = false
    position = 0, -250
    halign = center
    valign = center
    
    # Пытаемся заставить цвет меняться (на всякий случай)
    capslock_color = rgba(255, 143, 171, 1.0) # Soft Pink
}

# Текущая раскладка клавиатуры
label {
    monitor =
    text = $LAYOUT
    color = rgba(0, 191, 165, 0.8) # Emerald
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -310
    halign = center
    valign = center
}

# Метка статуса (Sorana OS)
label {
    monitor =
    text = Sorana OS
    color = rgba(255, 143, 171, 1.0) # Soft Pink
    font_size = 14
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -340
    halign = center
    valign = center
}

# Подложка для музыки (Liquid Glass эффект)
shape {
    monitor =
    size = 450, 50
    color = rgba(9, 10, 20, 0.4) # Void Indigo полупрозрачный для контраста
    rounding = 15
    border_size = 2
    border_color = rgba(0, 191, 165, 0.5) # Изумрудная рамка
    rotate = 0
    xray = false # Чтобы фон просвечивал сквозь фигуру

    position = 0, 50
    halign = center
    valign = bottom
}

# Информация о текущей песне
label {
    monitor =
    text = cmd[update:2000] bash ~/.local/bin/get_music.sh
    color = rgba(0, 191, 165, 1.0) # Изумрудный акцент
    font_size = 16
    font_family = JetBrainsMono Nerd Font Bold
    
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
    
    position = 0, 62 # Смещаем чуть выше центра плашки
    halign = center
    valign = bottom
}
